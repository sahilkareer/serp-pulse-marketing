<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <clipPath id="r">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
    <clipPath id="c">
      <circle cx="16" cy="16" r="10.5"/>
    </clipPath>
  </defs>
  <!-- 4-color Google quadrants -->
  <g clip-path="url(#r)">
    <rect x="0" y="0" width="16" height="16" fill="#4285F4"/>
    <rect x="16" y="0" width="16" height="16" fill="#EA4335"/>
    <rect x="0" y="16" width="16" height="16" fill="#34A853"/>
    <rect x="16" y="16" width="16" height="16" fill="#FBBC04"/>
  </g>
  <!-- White circle overlay -->
  <circle cx="16" cy="16" r="10.5" fill="white"/>
  <!-- Pulse/heartbeat icon -->
  <g clip-path="url(#c)">
    <circle cx="10.5" cy="13.5" r="2" fill="#EA4335"/>
    <polyline points="7,16.5 10.5,16.5 12.5,13 14.5,20 16.5,13.5 18.5,16.5 25,16.5"
      fill="none" stroke="#4285F4" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
